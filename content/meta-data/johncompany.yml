id: johncompany
name: John Company

filters:
  - name: Power
    prop: power
    type: number

  - name: Victory Points
    prop: victorypoints
    type: number

  - name: Retirement Discount
    prop: discount
    type: number

subproducts:
  - name: John Company 2nd Edition
    id: johncompany2nd
    desc: >
      John Company is a game about being the worst.

external:
  rules: https://rules.buriedgiantstudios.com/?product=johncompany

# https://handlebarsjs.com/guide/
cardTemplate:
  en-US: >
    {{#if meta.power }}
      <div>
        <p>Power: {{ meta.power }}
      </div>
    {{/if}}

    {{#if meta.victorypoints }}
      <div>
        <p>Victory Points: {{ meta.victorypoints }}
      </div>
    {{/if}}

    {{#if meta.discount }}
      <div>
        <p>Retirement Discount: {{ meta.discount }}
      </div>
    {{/if}}

